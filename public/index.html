<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出張見積もり自動化システム</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="container">
  <h1>出張見積もり自動作成</h1>
  <p class="subtitle">サンマックスレーザー / 株式会社リンシュンドウ</p>

  <section class="card">
    <h2>顧客情報</h2>
    <div class="form-row">
      <label>顧客名<span class="req">*</span></label>
      <input type="text" id="clientName" placeholder="例：大塚刷毛製造株式会社 様" required>
    </div>
    <div class="form-row">
      <label>顧客住所</label>
      <input type="text" id="clientAddress" placeholder="例：〒160-8511 東京都新宿区四谷4-1">
    </div>
    <div class="form-row">
      <label>見積番号</label>
      <input type="text" id="quoteNumber" placeholder="例：FL2601001">
    </div>
    <div class="form-row">
      <label>見積日</label>
      <input type="date" id="quoteDate">
    </div>
  </section>

  <section class="card">
    <h2>出張情報</h2>
    <div class="form-row">
      <label>出張先地域<span class="req">*</span></label>
      <select id="region">
        <option value="">-- 選択してください --</option>
        <option value="東京">東京（350km）</option>
        <option value="大阪">大阪（400km）</option>
        <option value="名古屋">名古屋（200km）</option>
        <option value="福岡">福岡（700km）</option>
        <option value="広島">広島（700km）</option>
        <option value="札幌">札幌（1100km）</option>
        <option value="仙台">仙台（500km）</option>
        <option value="高崎">高崎（360km）</option>
        <option value="千葉">千葉（380km）</option>
        <option value="土浦">土浦（400km）</option>
        <option value="岡崎">岡崎（80km）</option>
        <option value="四日市">四日市（90km）</option>
        <option value="函館">函館（1200km）</option>
        <option value="行田">行田（340km）</option>
        <option value="岐阜">岐阜（0km）</option>
        <option value="custom">その他（km手入力）</option>
      </select>
    </div>
    <div class="form-row" id="customKmRow" style="display:none;">
      <label>片道距離（km）</label>
      <input type="number" id="customKm" placeholder="例：250" min="0">
    </div>
    <div class="form-row">
      <label>会場・住所</label>
      <input type="text" id="venue" placeholder="例：群馬県高崎市内（会場未定）">
    </div>
    <div class="form-row">
      <label>デモ予定日</label>
      <input type="date" id="demoDate">
    </div>
    <div class="form-row">
      <label>作業日数<span class="req">*</span></label>
      <input type="number" id="days" value="1" min="1">
    </div>
    <div class="form-row">
      <label>宿泊数</label>
      <input type="number" id="nights" value="0" min="0">
    </div>
    <div class="form-row">
      <label>人数</label>
      <input type="number" id="people" value="1" min="1">
    </div>
    <div class="form-row">
      <label>曜日区分</label>
      <select id="dayType">
        <option value="weekday">平日</option>
        <option value="weekend">休日</option>
      </select>
    </div>
  </section>

  <section class="card">
    <h2>オプション項目</h2>
    <div class="form-check">
      <input type="checkbox" id="includeLcw" checked>
      <label for="includeLcw">LCWデモ機展示設置費（20,000円）</label>
    </div>
    <div class="form-check">
      <input type="checkbox" id="includeNitrogen">
      <label for="includeNitrogen">窒素使用（5,000円/日）</label>
    </div>
    <div class="form-check">
      <input type="checkbox" id="includePartition">
      <label for="includePartition">パーテーション（5,000円）</label>
    </div>
    <div class="form-check">
      <input type="checkbox" id="includeWorkTable">
      <label for="includeWorkTable">保護メガネ・手袋・溶接台（5,000円）</label>
    </div>
    <div class="form-row">
      <label>値引き額（円）</label>
      <input type="number" id="discount" value="0" min="0">
    </div>
  </section>

  <section>
    <button class="btn-primary" onclick="calculate()">計算する</button>
    <button class="btn-success" id="downloadBtn" onclick="download()" style="display:none;">Excelダウンロード</button>
  </section>

  <section id="resultSection" style="display:none;" class="card">
    <h2>見積もり結果</h2>
    <table id="resultTable">
      <thead><tr><th>項目</th><th>単価</th><th>数量</th><th>金額</th></tr></thead>
      <tbody id="resultBody"></tbody>
    </table>
    <div class="total-box">
      <div>小計：<span id="subtotal"></span>円</div>
      <div>値引き：<span id="discountDisplay"></span>円</div>
      <div>消費税（10%）：<span id="tax"></span>円</div>
      <div class="grand-total">合計（税込）：<span id="grandTotal"></span>円</div>
    </div>
  </section>
</div>

<script src="js/quote-calculator.js"></script>
<script src="js/excel-export.js"></script>
<script>
  document.getElementById('region').addEventListener('change', function() {
    document.getElementById('customKmRow').style.display = this.value === 'custom' ? 'flex' : 'none';
  });

  function calculate() {
    const region = document.getElementById('region').value;
    if (!region) {
      alert('出張先地域を選択してください');
      return;
    }
    const params = {
      region: region,
      customKm: parseInt(document.getElementById('customKm').value) || 0,
      days: parseInt(document.getElementById('days').value) || 1,
      nights: parseInt(document.getElementById('nights').value) || 0,
      people: parseInt(document.getElementById('people').value) || 1,
      isWeekend: document.getElementById('dayType').value === 'weekend',
      includeLcw: document.getElementById('includeLcw').checked,
      includeNitrogen: document.getElementById('includeNitrogen').checked,
      includePartition: document.getElementById('includePartition').checked,
      includeWorkTable: document.getElementById('includeWorkTable').checked,
      discount: parseInt(document.getElementById('discount').value) || 0
    };
    const quote = new QuoteCalculator(params).getQuote();
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = '';
    Object.values(quote.breakdown).filter(function(i) { return i && i.amount > 0; }).forEach(function(item) {
      const tr = document.createElement('tr');
      tr.innerHTML = '<td>' + item.label + '</td><td colspan="2"></td><td>' + item.amount.toLocaleString() + '</td>';
      tbody.appendChild(tr);
    });
    document.getElementById('subtotal').textContent = quote.subtotal.toLocaleString();
    document.getElementById('discountDisplay').textContent = quote.discount.toLocaleString();
    document.getElementById('tax').textContent = quote.tax.toLocaleString();
    document.getElementById('grandTotal').textContent = quote.total.toLocaleString();
    document.getElementById('resultSection').style.display = 'block';
    document.getElementById('downloadBtn').style.display = 'inline-block';
    window._lastQuote = quote;
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
  }

  function download() {
    const meta = {
      clientName: document.getElementById('clientName').value || '顧客名',
      clientAddress: document.getElementById('clientAddress').value || '',
      quoteNumber: document.getElementById('quoteNumber').value || 'FL' + new Date().getFullYear().toString().slice(-2) + String(new Date().getMonth()+1).padStart(2,'0') + '001',
      quoteDate: document.getElementById('quoteDate').value || new Date().toISOString().slice(0,10),
      venue: document.getElementById('venue').value || '',
      demoDate: document.getElementById('demoDate').value || ''
    };
    if (window._lastQuote) exportQuoteToExcel(window._lastQuote, meta);
  }
</script>
</body>
</html>
